<svg width="100%" viewBox="0 360 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Aundreka OS developer profile terminal</title>
  <desc>A light terminal-style developer profile card for Aundreka OS v1.0 with an animated ASCII pet and typing effect.</desc>

  <defs>
    <pattern id="dots-light" x="0" y="360" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#d8dee4"/>
    </pattern>
    <clipPath id="typing-clip-light">
      <rect x="36" y="570" width="0" height="18">
        <animate attributeName="width" values="0;0;145;145" keyTimes="0;0.15;0.7;1" dur="4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="0" y="360" width="680" height="300" rx="16" fill="url(#dots-light)"/>
  <rect x="12" y="372" width="656" height="276" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="0.75"/>
  <rect x="12" y="372" width="656" height="44" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
  <rect x="12" y="400" width="656" height="16" fill="#f6f8fa"/>

  <circle cx="38" cy="394" r="5.5" fill="#FF5F57"/>
  <circle cx="58" cy="394" r="5.5" fill="#FEBC2E"/>
  <circle cx="78" cy="394" r="5.5" fill="#28C840"/>

  <text font-family="monospace" font-size="12" x="340" y="398" text-anchor="middle" fill="#57606a">aundreka_os - profile.sh</text>

  <circle cx="602" cy="394" r="4" fill="#28C840" opacity="0.9"/>
  <text font-family="monospace" font-size="12" x="612" y="398" fill="#57606a">online</text>
  <line x1="12" y1="416" x2="668" y2="416" stroke="#d0d7de" stroke-width="0.75"/>

  <text font-family="monospace" font-size="12" x="36" y="450" fill="#57606a">$</text>
  <text font-family="monospace" font-size="12" x="50" y="450" fill="#57606a">whoami</text>
  <text font-family="monospace" font-size="12" x="36" y="470" fill="#24292f">aundreka | developer | builder</text>
  <line x1="36" y1="482" x2="400" y2="482" stroke="#d0d7de" stroke-width="0.5"/>

  <text font-family="monospace" font-size="12" x="36" y="503" fill="#57606a">$</text>
  <text font-family="monospace" font-size="12" x="50" y="503" fill="#57606a">ls projects/</text>
  <rect x="36" y="512" width="36" height="18" rx="4" fill="#dbeafe" opacity="0.9"/>
  <text x="54" y="524" text-anchor="middle" font-family="monospace" font-size="11" fill="#185FA5">web</text>
  <rect x="78" y="512" width="46" height="18" rx="4" fill="#ede9fe" opacity="0.9"/>
  <text x="101" y="524" text-anchor="middle" font-family="monospace" font-size="11" fill="#534AB7">mobile</text>
  <rect x="130" y="512" width="42" height="18" rx="4" fill="#dcfce7" opacity="0.9"/>
  <text x="151" y="524" text-anchor="middle" font-family="monospace" font-size="11" fill="#3B6D11">games</text>
  <rect x="178" y="512" width="24" height="18" rx="4" fill="#fef3c7" opacity="0.9"/>
  <text x="190" y="524" text-anchor="middle" font-family="monospace" font-size="11" fill="#854F0B">ai</text>
  <line x1="36" y1="540" x2="400" y2="540" stroke="#d0d7de" stroke-width="0.5"/>

  <text font-family="monospace" font-size="12" x="36" y="560" fill="#57606a">$</text>
  <text font-family="monospace" font-size="12" x="50" y="560" fill="#57606a">today --recommend</text>
  <g clip-path="url(#typing-clip-light)">
    <text font-family="monospace" font-size="12" x="36" y="580" fill="#24292f">-&gt; launch a featured repo</text>
  </g>
  <rect x="36" y="569" width="8" height="13" rx="1" fill="#57606a" opacity="0.7">
    <animate attributeName="x" values="36;36;181;181" keyTimes="0;0.15;0.7;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <line x1="416" y1="424" x2="416" y2="636" stroke="#d0d7de" stroke-width="0.75"/>

  <text font-family="monospace" font-size="12" x="444" y="460" fill="#57606a">pet_ai.exe</text>
  <line x1="444" y1="468" x2="644" y2="468" stroke="#d0d7de" stroke-width="0.5"/>

  <g fill="#57606a" font-family="monospace" font-size="13" text-anchor="middle" xml:space="preserve">
    <g>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.32;0.34;0.66;1" dur="2.8s" repeatCount="indefinite"/>
      <text x="530" y="498"> /\_/\ </text>
      <text x="530" y="518">=( o.o )=</text>
      <text x="530" y="538">  &gt; ^ &lt; </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.34;0.66;1" dur="2.8s" repeatCount="indefinite"/>
      <text x="530" y="498"> /\_/\ </text>
      <text x="530" y="518">=( -.- )=</text>
      <text x="530" y="538">  z Z z </text>
    </g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -1;0 0;0 1;0 0" dur="1.6s" repeatCount="indefinite"/>
  </g>

  <text font-family="monospace" font-size="12" x="530" y="566" text-anchor="middle" fill="#57606a">says:</text>
  <text font-family="monospace" font-size="12" x="530" y="584" text-anchor="middle" fill="#24292f">keep building.</text>

  <line x1="12" y1="620" x2="668" y2="620" stroke="#d0d7de" stroke-width="0.5"/>
  <rect x="36" y="630" width="80" height="4" rx="2" fill="#28C840" opacity="0.6"/>
  <rect x="124" y="630" width="55" height="4" rx="2" fill="#185FA5" opacity="0.6"/>
  <rect x="187" y="630" width="95" height="4" rx="2" fill="#534AB7" opacity="0.6"/>
  <rect x="290" y="630" width="65" height="4" rx="2" fill="#D4537E" opacity="0.6"/>
  <text font-family="monospace" font-size="12" x="644" y="636" text-anchor="end" fill="#57606a">v1.0</text>
</svg>
