<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Aundreka OS developer profile terminal</title>
  <desc>A terminal-style developer profile card for Aundreka OS v1.0 with an animated ASCII pet and typing effect.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#30363d"/>
    </pattern>
    <clipPath id="typing-clip-dark">
      <rect x="36" y="210" width="0" height="18">
        <animate attributeName="width" values="0;0;145;145" keyTimes="0;0.15;0.7;1" dur="4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="680" height="300" rx="16" fill="url(#dots)"/>
  <rect x="12" y="12" width="656" height="276" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.75"/>

  <rect x="12" y="12" width="656" height="44" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <rect x="12" y="40" width="656" height="16" fill="#0d1117"/>

  <circle cx="38" cy="34" r="5.5" fill="#FF5F57"/>
  <circle cx="58" cy="34" r="5.5" fill="#FEBC2E"/>
  <circle cx="78" cy="34" r="5.5" fill="#28C840"/>

  <text font-family="monospace" font-size="12" x="340" y="38" text-anchor="middle" fill="#8b949e">aundreka_os - profile.sh</text>

  <circle cx="602" cy="34" r="4" fill="#28C840" opacity="0.9"/>
  <text font-family="monospace" font-size="12" x="612" y="38" fill="#8b949e">online</text>

  <line x1="12" y1="56" x2="668" y2="56" stroke="#30363d" stroke-width="0.75"/>

  <text font-family="monospace" font-size="12" x="36" y="90" fill="#8b949e">$</text>
  <text font-family="monospace" font-size="12" x="50" y="90" fill="#8b949e">whoami</text>
  <text font-family="monospace" font-size="12" x="36" y="110" fill="#f0f6fc">aundreka | developer | builder</text>

  <line x1="36" y1="122" x2="400" y2="122" stroke="#30363d" stroke-width="0.5"/>

  <text font-family="monospace" font-size="12" x="36" y="143" fill="#8b949e">$</text>
  <text font-family="monospace" font-size="12" x="50" y="143" fill="#8b949e">ls projects/</text>

  <rect x="36" y="152" width="36" height="18" rx="4" fill="#0C447C" opacity="0.3"/>
  <text x="54" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">web</text>

  <rect x="78" y="152" width="46" height="18" rx="4" fill="#3C3489" opacity="0.3"/>
  <text x="101" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#a855f7">mobile</text>

  <rect x="130" y="152" width="42" height="18" rx="4" fill="#3B6D11" opacity="0.3"/>
  <text x="151" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#7ee787">games</text>

  <rect x="178" y="152" width="24" height="18" rx="4" fill="#854F0B" opacity="0.3"/>
  <text x="190" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffa657">ai</text>

  <line x1="36" y1="180" x2="400" y2="180" stroke="#30363d" stroke-width="0.5"/>

  <text font-family="monospace" font-size="12" x="36" y="200" fill="#8b949e">$</text>
  <text font-family="monospace" font-size="12" x="50" y="200" fill="#8b949e">today --recommend</text>
  <g clip-path="url(#typing-clip-dark)">
    <text font-family="monospace" font-size="12" x="36" y="220" fill="#f0f6fc">-&gt; launch a featured repo</text>
  </g>

  <rect x="36" y="209" width="8" height="13" rx="1" fill="#8b949e" opacity="0.7">
    <animate attributeName="x" values="36;36;181;181" keyTimes="0;0.15;0.7;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <line x1="416" y1="64" x2="416" y2="276" stroke="#30363d" stroke-width="0.75"/>

  <text font-family="monospace" font-size="12" x="444" y="100" fill="#8b949e">pet_ai.exe</text>
  <line x1="444" y1="108" x2="644" y2="108" stroke="#30363d" stroke-width="0.5"/>

  <g fill="#8b949e" font-family="monospace" font-size="13" text-anchor="middle" xml:space="preserve">
    <g>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.32;0.34;0.66;1" dur="2.8s" repeatCount="indefinite"/>
      <text x="530" y="138"> /\_/\ </text>
      <text x="530" y="158">=( o.o )=</text>
      <text x="530" y="178">  &gt; ^ &lt; </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.34;0.66;1" dur="2.8s" repeatCount="indefinite"/>
      <text x="530" y="138"> /\_/\ </text>
      <text x="530" y="158">=( -.- )=</text>
      <text x="530" y="178">  z Z z </text>
    </g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -1;0 0;0 1;0 0" dur="1.6s" repeatCount="indefinite"/>
  </g>

  <text font-family="monospace" font-size="12" x="530" y="206" text-anchor="middle" fill="#8b949e">says:</text>
  <text font-family="monospace" font-size="12" x="530" y="224" text-anchor="middle" fill="#f0f6fc">keep building.</text>

  <line x1="12" y1="260" x2="668" y2="260" stroke="#30363d" stroke-width="0.5"/>

  <rect x="36" y="270" width="80" height="4" rx="2" fill="#28C840" opacity="0.7"/>
  <rect x="124" y="270" width="55" height="4" rx="2" fill="#58a6ff" opacity="0.7"/>
  <rect x="187" y="270" width="95" height="4" rx="2" fill="#a855f7" opacity="0.7"/>
  <rect x="290" y="270" width="65" height="4" rx="2" fill="#f472b6" opacity="0.7"/>

  <text font-family="monospace" font-size="12" x="644" y="276" text-anchor="end" fill="#8b949e">v1.0</text>
</svg>
