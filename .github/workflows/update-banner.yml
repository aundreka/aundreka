name: Update Profile Banner

on:
  schedule:
    # Runs at the greeting period boundaries in Asia/Manila (UTC+8):
    # 00:00, 06:00, 12:00, 17:00, and 21:00 Philippines time
    # Corresponding UTC times: 16:00, 22:00, 04:00, 09:00, and 13:00
    - cron: "0 16,22,4,9,13 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate banner
        run: python generate_banner.py --github --mode chronological --theme both

      - name: Commit updated banners
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add banner-dark.svg banner-light.svg

          if git diff --cached --quiet; then
            echo "No banner changes."
          else
            git commit -m "Update daily profile banner"
            git push
          fi
