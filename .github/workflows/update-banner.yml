name: Update Profile Banner

on:
  schedule:
    # Runs every day at 12:00 AM UTC
    # This is 8:00 AM Philippines time
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate banner
        run: python3 generate_banner.py --mode weighted --theme both --streak 7

      - name: Commit updated banners
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add banner-dark.svg banner-light.svg

          if git diff --cached --quiet; then
            echo "No banner changes."
          else
            git commit -m "Update daily profile banner"
            git push
          fi